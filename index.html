<!DOCTYPE html>

<html>
<head>
  <title>ADIF Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
  </style>

</head>
<body>

<div id="map"></div>

<script>
var map = L.map('map').setView([37.8, -96], 4);

// Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// Sample data (replace later with GeoJSON file)
var data = [
  {name: "Station A", lat: 30.44, lon: -84.28, value: 1},
  {name: "Station B", lat: 29.65, lon: -82.32, value: 3}
];

// Color by value
function getColor(v) {
  return v > 2 ? 'red' :
         v > 1 ? 'orange' :
                 'green';
}

// Add markers
data.forEach(function(d) {
  var marker = L.circleMarker([d.lat, d.lon], {
    radius: 8,
    fillColor: getColor(d.value),
    color: "#000",
    weight: 1,
    fillOpacity: 0.8
  }).addTo(map);

  marker.bindPopup("<b>" + d.name + "</b><br>Value: " + d.value);
});
</script>

</body>
</html>
